id: support
display_name: Support Operations
description: Customer support and customer operations traces.
signal_types:
  - customer_constraint
  - known_fix
  - failed_path
  - escalation
  - product_behavior
  - repeated_waste
  - guardrail_candidate
reject_as_noise:
  - politeness phrases
  - routine acknowledgements
  - one-off emotional language without reusable follow-up
  - private personal data
  - generic troubleshooting steps with no durable lesson
output_cards:
  - customer_constraint
  - known_fix
  - failed_path
  - escalation
  - product_behavior
  - repeated_waste
  - guardrail_candidate
evidence_rules:
  - keep ticket or case ids as episode or evidence context unless the reusable card is scoped to that exact active case
  - keep policy or playbook sources as evidence unless the durable action is to consult that source directly
  - keep affected product, account, or team only if non-sensitive or redacted
  - attach quote or trace line when possible
scope_rules:
  - use domain scope for support operations unless a narrower customer-safe scope is provided
  - do not store private customer details in reusable cards
