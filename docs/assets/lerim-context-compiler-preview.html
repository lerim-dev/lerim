<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lerim Context Compiler SVG Preview</title>
    <style>
      :root {
        color-scheme: light dark;
        --page: #eef3ef;
        --ink: #17382a;
        --muted: #65776c;
        --panel: #fffefa;
        --border: #d7e4dc;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --page: #0b1210;
          --ink: #e9f4ee;
          --muted: #a8b9af;
          --panel: #111d18;
          --border: #2b4237;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--page);
        color: var(--ink);
        font: 16px/1.5 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .wrap {
        width: min(1180px, calc(100vw - 40px));
        margin: 40px auto;
      }

      .intro {
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .frame {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 22px 70px rgb(15 42 30 / 0.14);
      }

      img {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="intro">
        <h1>Lerim context compiler</h1>
        <p>Self-contained animated SVG preview for the GitHub README hero.</p>
      </div>
      <div class="frame" role="region" aria-label="Animated SVG preview">
        <img src="./lerim-context-compiler.svg" alt="Lerim compiles completed agent runs into compact cited context for the next agent.">
      </div>
    </div>
  </body>
</html>
