<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 680" role="img" aria-labelledby="loopTitle loopDesc">
  <title id="loopTitle">Lerim's context loop</title>
  <desc id="loopDesc">A four-step loop: a completed agent run is captured and compiled by Lerim into cited context records, which are served back into the next run, and the cycle repeats.</desc>

  <defs>
    <linearGradient id="loopPage" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b10"/>
      <stop offset="52%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#101820"/>
    </linearGradient>

    <radialGradient id="hubGlow" cx="50%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#5dffc0" stop-opacity="0.34"/>
      <stop offset="55%" stop-color="#35c990" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#35c990" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ringStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7fd8ff"/>
      <stop offset="46%" stop-color="#62f7b8"/>
      <stop offset="100%" stop-color="#33a7e4"/>
    </linearGradient>

    <linearGradient id="dropGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8b95a"/>
      <stop offset="100%" stop-color="#d4a44a"/>
    </linearGradient>

    <pattern id="loopDots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.9" fill="#fcf3d8" fill-opacity="0.1"/>
    </pattern>

    <filter id="loopShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000806" flood-opacity="0.34"/>
    </filter>

    <marker id="arrowLoop" viewBox="0 0 10 10" refX="8.2" refY="5" markerWidth="6" markerHeight="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 9 5 L 1 9 Z" fill="#64f5b8"/>
    </marker>

    <style>
      .sans { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }

      .eyebrow {
        font: 850 12px "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        fill: #64f5b8;
        letter-spacing: 0.28em;
        text-anchor: middle;
      }
      .hero-title {
        font: 850 36px Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #fcf3d8;
        letter-spacing: -0.02em;
        text-anchor: middle;
      }
      .hero-title tspan { fill: #64f5b8; }
      .hero-sub {
        font: 600 16px Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: rgba(252,243,216,0.76);
        text-anchor: middle;
      }
      .node-label {
        font: 800 14px Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #fcf3d8;
        text-anchor: middle;
      }
      .node-sub {
        font: 700 10.5px "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        fill: rgba(252,243,216,0.58);
        text-anchor: middle;
      }
      .chip-num {
        font: 850 12px "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        fill: #06110c;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .hub-word {
        font: 900 17px Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #f6fff9;
        letter-spacing: -0.01em;
        text-anchor: middle;
      }
      .hub-sub {
        font: 850 10px "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        fill: #64f5b8;
        letter-spacing: 0.2em;
        text-anchor: middle;
      }
      .loop-cap {
        font: 750 10.5px "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        fill: rgba(252,243,216,0.6);
        letter-spacing: 0.08em;
        text-anchor: middle;
      }

      .node-box { stroke-width: 1.5; }
      .arrow {
        fill: none;
        stroke: #64f5b8;
        stroke-width: 2.4;
        stroke-linecap: round;
        opacity: 0.92;
      }
      .arrow-flow {
        fill: none;
        stroke: #bffff0;
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-dasharray: 4 14;
        opacity: 0.9;
        animation: loopflow 2.6s linear infinite;
      }
      .loop-track {
        fill: none;
        stroke: rgba(100,245,184,0.16);
        stroke-width: 1.4;
        stroke-dasharray: 3 9;
      }

      @keyframes loopflow { to { stroke-dashoffset: -18; } }
      @media (prefers-reduced-motion: reduce) {
        .arrow-flow { animation: none !important; opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1180" height="680" fill="url(#loopPage)"/>
  <rect width="1180" height="680" fill="url(#loopDots)" opacity="0.7"/>

  <!-- Header -->
  <g class="sans">
    <text x="590" y="52" class="eyebrow">OPEN-SOURCE AGENT MEMORY</text>
    <text x="590" y="92" class="hero-title">lerim's <tspan>context loop</tspan></text>
    <text x="590" y="124" class="hero-sub">Completed agent runs are compiled into cited, reusable context, then served back so the next run starts smarter.</text>
  </g>

  <!-- Faint loop track through the four nodes -->
  <ellipse cx="590" cy="400" rx="365" ry="195" class="loop-track"/>

  <!-- Clockwise arrows: 1 -> 2 -> 3 -> 4 -> 1 -->
  <g>
    <path class="arrow" d="M 720 205 C 850 205, 955 250, 955 347" marker-end="url(#arrowLoop)"/>
    <path class="arrow-flow" d="M 720 205 C 850 205, 955 250, 955 347"/>

    <path class="arrow" d="M 955 453 C 955 555, 840 595, 726 595" marker-end="url(#arrowLoop)"/>
    <path class="arrow-flow" d="M 955 453 C 955 555, 840 595, 726 595"/>

    <path class="arrow" d="M 454 595 C 340 595, 225 555, 225 453" marker-end="url(#arrowLoop)"/>
    <path class="arrow-flow" d="M 454 595 C 340 595, 225 555, 225 453"/>

    <path class="arrow" d="M 225 347 C 225 250, 340 205, 454 205" marker-end="url(#arrowLoop)"/>
    <path class="arrow-flow" d="M 225 347 C 225 250, 340 205, 454 205"/>
  </g>

  <!-- Loop-closes caption on the return arc (4 -> 1) -->
  <text x="300" y="292" class="loop-cap sans" transform="rotate(-38 300 292)">the loop repeats</text>

  <!-- Center hub: Lerim, the context compiler -->
  <g>
    <circle cx="590" cy="400" r="118" fill="url(#hubGlow)"/>
    <circle cx="590" cy="400" r="58" fill="rgba(13,17,23,0.94)" stroke="url(#ringStroke)" stroke-width="2.6"/>
    <!-- Nabla-drop brand mark -->
    <g transform="translate(590 392) scale(0.6) translate(-50 -50)">
      <path d="M 50 10 L 20 70 Q 50 100 80 70 Z" fill="url(#dropGradient)"/>
      <circle cx="50" cy="58" r="8" fill="#0a0a0b" opacity="0.85"/>
      <circle cx="50" cy="58" r="3" fill="#e8b95a"/>
    </g>
    <text x="590" y="478" class="hub-word sans">lerim</text>
    <text x="590" y="495" class="hub-sub">CONTEXT COMPILER</text>
  </g>

  <!-- Node 1: Completed agent run (top) -->
  <g filter="url(#loopShadow)">
    <rect x="466" y="164" width="248" height="82" rx="15" class="node-box" fill="rgba(127,216,255,0.12)" stroke="rgba(127,216,255,0.5)"/>
    <circle cx="590" cy="190" r="11" fill="none" stroke="#7fd8ff" stroke-width="2.2"/>
    <path d="M 585.5 190 L 588.8 193.4 L 595 186.4" fill="none" stroke="#7fd8ff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="590" y="216" class="node-label sans">Completed agent run</text>
    <text x="590" y="233" class="node-sub">task done · trace saved</text>
  </g>
  <circle cx="486" cy="164" r="12" fill="#7fd8ff"/>
  <text x="486" y="164.5" class="chip-num">1</text>

  <!-- Node 2: Lerim captures &amp; compiles (right) -->
  <g filter="url(#loopShadow)">
    <rect x="831" y="359" width="248" height="82" rx="15" class="node-box" fill="rgba(100,245,184,0.13)" stroke="rgba(100,245,184,0.5)"/>
    <path d="M 946 379 H 968 L 959 390 V 397 H 955 V 390 Z" fill="none" stroke="#64f5b8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="955" y="411" class="node-label sans">Lerim captures &amp; compiles</text>
    <text x="955" y="428" class="node-sub">filter · extract · cite</text>
  </g>
  <circle cx="851" cy="359" r="12" fill="#64f5b8"/>
  <text x="851" y="359.5" class="chip-num">2</text>

  <!-- Node 3: Cited context records (bottom) -->
  <g filter="url(#loopShadow)">
    <rect x="466" y="554" width="248" height="82" rx="15" class="node-box" fill="rgba(255,217,107,0.11)" stroke="rgba(255,217,107,0.5)"/>
    <rect x="581" y="573" width="18" height="20" rx="2.5" fill="none" stroke="#ffd96b" stroke-width="2"/>
    <line x1="585" y1="579" x2="595" y2="579" stroke="#ffd96b" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="585" y1="583" x2="595" y2="583" stroke="#ffd96b" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="585" y1="587" x2="592" y2="587" stroke="#ffd96b" stroke-width="1.5" stroke-linecap="round"/>
    <text x="590" y="611" class="node-label sans">Cited context records</text>
    <text x="590" y="628" class="node-sub">source-backed · durable</text>
  </g>
  <circle cx="486" cy="554" r="12" fill="#ffd96b"/>
  <text x="486" y="554.5" class="chip-num">3</text>

  <!-- Node 4: Served back to the next run (left) -->
  <g filter="url(#loopShadow)">
    <rect x="101" y="359" width="248" height="82" rx="15" class="node-box" fill="rgba(191,167,255,0.13)" stroke="rgba(191,167,255,0.5)"/>
    <rect x="228" y="382" width="14" height="14" rx="3" fill="none" stroke="#bfa7ff" stroke-width="2"/>
    <path d="M 210 389 H 226" fill="none" stroke="#bfa7ff" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 222 385.5 L 226 389 L 222 392.5" fill="none" stroke="#bfa7ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="225" y="411" class="node-label sans">Served back to the next run</text>
    <text x="225" y="428" class="node-sub">loaded at startup</text>
  </g>
  <circle cx="121" cy="359" r="12" fill="#bfa7ff"/>
  <text x="121" y="359.5" class="chip-num">4</text>
</svg>
