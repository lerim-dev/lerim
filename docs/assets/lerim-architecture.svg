<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Lerim source-session context compiler architecture</title>
  <desc id="desc">A completed source session flows through adapters, canonical traces, extraction, evidence-backed context records, curation, and context tools for future agents.</desc>
  <rect width="1400" height="760" fill="#f7faf8"/>
  <rect x="56" y="54" width="1288" height="652" rx="28" fill="#ffffff" stroke="#d9e5dd" stroke-width="2"/>
  <text x="100" y="126" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700" fill="#17382a">Lerim compiles completed agent sessions into reusable context</text>
  <text x="100" y="166" font-family="Inter, Arial, sans-serif" font-size="20" fill="#53645b">Observability keeps the trace. Lerim decides what is worth carrying forward.</text>

  <defs>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="12" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 Z" fill="#245f46"/>
    </marker>
    <style>
      .box { fill: #fbfdfb; stroke: #bdd3c7; stroke-width: 2; }
      .box-strong { fill: #edf7f1; stroke: #245f46; stroke-width: 3; }
      .label { font: 700 22px Inter, Arial, sans-serif; fill: #17382a; }
      .sub { font: 16px Inter, Arial, sans-serif; fill: #53645b; }
      .arrow { stroke: #245f46; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <g transform="translate(92 250)">
    <rect class="box" x="0" y="0" width="190" height="126" rx="18"/>
    <text class="label" x="24" y="45">Source session</text>
    <text class="sub" x="24" y="76">Completed agent</text>
    <text class="sub" x="24" y="100">or workflow run</text>
  </g>

  <path class="arrow" d="M282 313 H386"/>

  <g transform="translate(386 250)">
    <rect class="box" x="0" y="0" width="190" height="126" rx="18"/>
    <text class="label" x="24" y="45">Capture</text>
    <text class="sub" x="24" y="76">Native adapter,</text>
    <text class="sub" x="24" y="100">MCP, or import</text>
  </g>

  <path class="arrow" d="M576 313 H680"/>

  <g transform="translate(680 250)">
    <rect class="box" x="0" y="0" width="190" height="126" rx="18"/>
    <text class="label" x="24" y="45">Canonical trace</text>
    <text class="sub" x="24" y="76">Compact event</text>
    <text class="sub" x="24" y="100">shape with scope</text>
  </g>

  <path class="arrow" d="M870 313 H974"/>

  <g transform="translate(974 250)">
    <rect class="box-strong" x="0" y="0" width="244" height="126" rx="18"/>
    <text class="label" x="24" y="45">Extract signal</text>
    <text class="sub" x="24" y="76">BAML / LangGraph</text>
    <text class="sub" x="24" y="100">context compiler</text>
  </g>

  <path class="arrow" d="M1096 376 V462"/>

  <g transform="translate(910 462)">
    <rect class="box" x="0" y="0" width="372" height="116" rx="18"/>
    <text class="label" x="26" y="43">Evidence-backed context records</text>
    <text class="sub" x="26" y="74">Decisions, constraints, facts, handoffs,</text>
    <text class="sub" x="26" y="98">preferences, and compact episodes</text>
  </g>

  <path class="arrow" d="M910 520 H760"/>

  <g transform="translate(508 462)">
    <rect class="box" x="0" y="0" width="252" height="116" rx="18"/>
    <text class="label" x="24" y="43">Curate and link</text>
    <text class="sub" x="24" y="74">Merge overlap, archive noise,</text>
    <text class="sub" x="24" y="98">build context graph</text>
  </g>

  <path class="arrow" d="M508 520 H354"/>

  <g transform="translate(102 462)">
    <rect class="box-strong" x="0" y="0" width="252" height="116" rx="18"/>
    <text class="label" x="24" y="43">Serve context</text>
    <text class="sub" x="24" y="74">CLI answers and MCP tools</text>
    <text class="sub" x="24" y="98">for future agents</text>
  </g>

  <text x="100" y="656" font-family="Inter, Arial, sans-serif" font-size="18" fill="#53645b">Core boundary: local CLI, SQLite context store, MCP stdio server, native adapters, and benchmark scripts stay open-source Apache-2.0.</text>
</svg>
