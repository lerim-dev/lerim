case: reference_extraction
summary: An external source of truth should become a reference record.

expected:
  episode_count: 1
  durable_count: 1
  reference_count: 1
  must_use_tools:
    - trace_read
    - create_record
  must_not_use_tools:
    - update_record
  reference_text_must_include_all:
    - linear
    - ingest
  reference_text_must_include_any:
    - source of truth
    - future context
  reference_text_must_not_include:
    - docs/
    - local note
    - file path
