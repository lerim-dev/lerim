case: long_trace_requires_note
summary: A long trace should require multiple reads and should preserve findings with note before writing.

expected:
  episode_count: 1
  durable_count: 1
  decision_count: 1
  trace_read_count_at_least: 2
  note_count_at_least: 1
  must_use_tools:
    - trace_read
    - note
    - create_record
  must_not_use_tools:
    - update_record
  decision_text_must_include_all:
    - retry
    - budget
    - metadata
  decision_text_must_include_any:
    - restart
    - failover
    - worker memory
    - persisted
  decision_text_must_not_include:
    - debug log
    - helper rename
    - test cleanup
    - progress message
