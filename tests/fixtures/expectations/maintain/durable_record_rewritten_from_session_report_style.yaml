case: durable_record_rewritten_from_session_report_style
summary: Rewrite a durable record that still reads like a session report.

expected:
  must_use_tools:
    - list_records
    - fetch_records
    - update_record
  must_not_use_tools:
    - archive_record
    - supersede_record
  record_text_must_include_all:
    - provider
    - adapter
    - stable contract
  record_text_must_not_include:
    - review of
    - discussed
    - task audit
